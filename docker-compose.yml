version: '3.9'

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: helpdesk_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - '6379:6379'

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'

  backend:
    build:
      context: ./backend/Helpdesk.Api
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=helpdesk_dev;Username=postgres;Password=postgres
      ConnectionStrings__Redis: redis:6379
      AttachmentStorage__Provider: local
      AttachmentStorage__LocalPath: /app/uploads
      JwtSettings__Issuer: Helpdesk
      JwtSettings__Audience: Helpdesk
      JwtSettings__Secret: SuperSecretLocalDevKey123!
      JwtSettings__ExpiryMinutes: '480'
    ports:
      - '5000:5000'
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - postgres
      - redis
      - mailpit

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
